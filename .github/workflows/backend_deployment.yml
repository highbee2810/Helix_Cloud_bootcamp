# This is a basic workflow to help you get started with Actions

name: Deploy to AWS

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: ssh to ec2-instance
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      # Step 3: Scan and add the EC2 server to known hosts to prevent the script from hanging
      - name: Add Remote Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Step 4: SSH into EC2 and run deployment commands
      - name: Execute Remote Deployment Commands
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh $USER@$HOST "
            # Navigate to your project directory on the server
            cd /home
            
            # Fetch latest changes from Git
            git pull origin main &&
            
            # Activate the virtual environment
            source venv/bin/activate &&

            cd /Helix_Cloud_bootcamp/backend
            
            # Install any new dependencies
            pip install -r requirements.txt &&
            
            # Run database migrations
            python manage.py migrate --noinput &&
            
            # Collect static files
            python manage.py collectstatic --noinput &&
            
            

          

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
